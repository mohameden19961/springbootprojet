services:
  - type: web
    name: library-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: SPRING_DATASOURCE_HOST
        fromDatabase:
          name: library-db
          property: host
      - key: SPRING_DATASOURCE_PORT
        fromDatabase:
          name: library-db
          property: port
      - key: SPRING_DATASOURCE_DATABASE
        fromDatabase:
          name: library-db
          property: database
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: library-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: library-db
          property: password
      - key: SPRING_PROFILES_ACTIVE
        value: prod

databases:
  - name: library-db
    plan: free
    databaseName: library_db
