spring.datasource.url=jdbc:mysql://localhost:3306/library_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=supnum
spring.datasource.password=${DB_PASSWORD:Supnum}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA & Hibernate configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# On force le dialecte pour éviter l'erreur "Unable to determine Dialect"
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Sécurité démarrage (on garde à never)
spring.sql.init.mode=never

# Pagination globale
spring.data.web.pageable.default-page-size=20
spring.data.web.pageable.max-page-size=100
server.port=8081
