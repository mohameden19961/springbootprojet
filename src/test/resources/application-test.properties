# Test profile: in-memory H2 in MySQL-compat mode. Overrides only the
# datasource/JPA properties; all other base settings (security, pagination,
# server port) come from src/main/resources/application.properties.
spring.datasource.url=jdbc:h2:mem:library_test;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_LOWER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# The production schema.sql uses MySQL-only DDL ("USE library_db", etc.) which
# H2 cannot parse. Let Hibernate generate the schema from the entity mappings.
spring.sql.init.mode=never
